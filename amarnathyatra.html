<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amarnath Yatra</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial;
}

html{
  scroll-behavior: smooth;
}

body {
  background: #000;
  color: white;
}

/* HEADER */
header{
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 40px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(255,255,255,0.2);
  z-index:1000;
}

.logo img{ width:50px; }

nav a{
  color:#ff5a00;
  margin-left:25px;
  text-decoration:none;
  font-weight:bold;
}

/* MAIN */
.container{
  display:flex;
  min-height:100vh;
  margin-top:80px;
}

/* LEFT */
.left{ flex:1; position:relative; }

.left::before{
  content:"";
  position:absolute;
  inset:0;
  background:url('amarnath20262.jpg') center/cover no-repeat;
  filter:blur(35px) brightness(0.5);
}

.left img{
  width:100%;
  height:100%;
  object-fit:contain;
  position:relative;
  z-index:2;
  padding:20px;
}

/* RIGHT */
.right{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
}

.form-box{
  width:90%;
  max-width:400px;
  padding:30px;
  border-radius:20px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(15px);
  box-shadow:0 0 50px rgba(255,0,0,0.3);
}

input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  border:none;
  background:rgba(255,255,255,0.1);
  color:white;
}

button{
  width:100%;
  padding:14px;
  border-radius:30px;
  border:none;
  background:linear-gradient(45deg,#ff0000,#ff4d4d);
  color:white;
  cursor:pointer;
}

/* LOADER */
.loader{
  display:none;
  text-align:center;
  margin-top:10px;
}

.loader span{
  width:10px;
  height:10px;
  background:red;
  margin:3px;
  display:inline-block;
  border-radius:50%;
  animation:bounce 0.6s infinite alternate;
}

@keyframes bounce{
  from{transform:translateY(0);}
  to{transform:translateY(-10px);}
}

/* SUCCESS */
.success{
  display:none;
  text-align:center;
  color:#25D366;
  margin-top:10px;
}

/* MOBILE */
@media(max-width:768px){
  .container{ flex-direction:column; }
  .left{ height:40vh; }
}
</style>
</head>

<body>

<header>
  <div class="logo">
    <img src="krishna copy png.png">
  </div>

  <nav>
    <a href="index.html">Home</a>
    <a href="index.html#tours">Tours</a>
    <a href="index.html#contact">Contact</a>
    <a href="#register">Register</a>
  </nav>
</header>

<div class="container" id="register">

<div class="left">
  <img src="amarnath20262.jpg">
</div>

<div class="right">
<div class="form-box">

<h2 style="text-align:center;color:#ff4d4d;">Registration</h2>

<input type="text" id="name" placeholder="Full Name" required>

<input type="number" id="age" placeholder="Age" required>

<input type="text" id="city" placeholder="City" required>

<input type="text" id="aadhar" placeholder="Aadhaar Number"
maxlength="12"
oninput="this.value=this.value.replace(/[^0-9]/g,'')" required>

<input type="tel" id="mobile" placeholder="Mobile Number"
maxlength="10"
oninput="this.value=this.value.replace(/[^0-9]/g,'')" required>

<button onclick="submitForm()">Register Now</button>

<div class="loader" id="loader">
  <span></span><span></span><span></span>
</div>

<div class="success" id="success">
  ✔ Submitted Successfully
</div>

</div>
</div>

</div>

<script>
function submitForm(){

let name = document.getElementById("name").value.trim();
let age = document.getElementById("age").value.trim();
let city = document.getElementById("city").value.trim();
let aadhar = document.getElementById("aadhar").value.trim();
let mobile = document.getElementById("mobile").value.trim();

if(!name || !age || !city || !aadhar || !mobile){
  alert("All fields are required");
  return;
}

if(aadhar.length !== 12){
  alert("Aadhaar must be 12 digits");
  return;
}

if(mobile.length !== 10){
  alert("Mobile must be 10 digits");
  return;
}

document.getElementById("loader").style.display="block";

setTimeout(function(){

let text = "New Registration:%0A"
+ "Name: " + name + "%0A"
+ "Age: " + age + "%0A"
+ "City: " + city + "%0A"
+ "Aadhaar: " + aadhar + "%0A"
+ "Mobile: " + mobile;

let url = "https://wa.me/919904388056?text=" + text;

window.open(url,"_blank");

document.getElementById("loader").style.display="none";
document.getElementById("success").style.display="block";

setTimeout(()=>{
  window.location.replace("index.html");
},2000);

},1500);

}
</script>

</body>
</html>
