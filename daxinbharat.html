<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daxin Bharat</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial;
}

body {
  background: #000;
  color: white;
}

/* 🔥 MAIN LAYOUT */
.container {
  display: flex;
  min-height: 100vh;
}

/* 🔴 LEFT IMAGE */
.left {
  flex: 1;
  position: relative;
  overflow: hidden;
}

.left::before {
  content: "";
  position: absolute;
  inset: 0;
  background: url('daxinbharat.jpg') center/cover no-repeat;
  filter: blur(35px) brightness(0.5);
}

.left img {
  position: relative;
  width: 100%;
  height: 100%;
  object-fit: contain;
  z-index: 2;
  padding: 20px;
}

/* 🔵 RIGHT FORM */
.right {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
  background: linear-gradient(135deg, #000, #111);
}

/* 🔥 FORM BOX */
.form-box {
  width: 100%;
  max-width: 400px;
  padding: 30px;
  border-radius: 20px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  box-shadow: 0 0 50px rgba(255,0,0,0.3);
}

.form-box h2 {
  text-align: center;
  margin-bottom: 20px;
  color: #ff4d4d;
}

/* INPUT */
.form-box input,
.form-box textarea {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border: none;
  outline: none;
  border-radius: 10px;
  background: rgba(255,255,255,0.1);
  color: white;
}

/* BUTTON */
.form-box button {
  width: 100%;
  padding: 14px;
  margin-top: 15px;
  border: none;
  border-radius: 30px;
  background: linear-gradient(45deg,#ff0000,#ff4d4d);
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

.form-box button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px red;
}

/* 📱 MOBILE */
@media(max-width:768px){
  .container {
    flex-direction: column;
  }

  .left {
    height: 40vh;
  }
}
</style>
</head>

<body>

<div class="container">

  <!-- LEFT IMAGE -->
  <div class="left">
    <img src="daxinbharat.jpg">
  </div>

  <!-- RIGHT FORM -->
  <div class="right">
    <div class="form-box">
      <h2>Registration Form</h2>

      <input type="text" id="name" placeholder="Your Name" required>

      <input type="tel" id="mobile" placeholder="Mobile Number"
      maxlength="10" required
      oninput="this.value=this.value.replace(/[^0-9]/g,'')">

      <textarea id="message" placeholder="Message"></textarea>

      <button onclick="sendWhatsApp()">Register Now</button>
    </div>
  </div>

</div>

<script>
function sendWhatsApp() {
  let name = document.getElementById("name").value.trim();
  let mobile = document.getElementById("mobile").value.trim();
  let message = document.getElementById("message").value.trim();

  let mobilePattern = /^[0-9]{10}$/;

  if(name === "" || mobile === ""){
    alert("Please fill all required fields");
    return;
  }

  if(!mobilePattern.test(mobile)){
    alert("Enter valid 10 digit mobile number");
    return;
  }

  let text = "New Registration:%0A"
           + "Name: " + name + "%0A"
           + "Mobile: " + mobile + "%0A"
           + "Message: " + message;

  let url = "https://wa.me/919904388056?text=" + text;

  // 🔥 OPEN WHATSAPP
  window.open(url, "_blank");

  // 🔥 FORCE REDIRECT AFTER 1.5 SEC
  setTimeout(function(){
    window.location.replace("index.html");
  }, 1500);
}
</script>

</body>
</html>
