<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Goa Trip</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      overflow: hidden;
    }

    .image-container {
      position: relative;
      width: 100%;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    /* 🔥 FULL BACKGROUND BLUR */
    .image-container::before {
      content: "";
      position: absolute;
      inset: -50px; /* edges blur cut na ho */
      background: url('1.jpg') center/cover no-repeat;
      filter: blur(60px) brightness(0.6);
      z-index: 0;
    }

    /* 🔴 RED LIGHT EFFECT */
    .image-container::after {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle, 
        rgba(255,0,0,0.3), 
        rgba(0,0,0,0.7)
      );
      z-index: 1;
    }

    /* 🔥 MAIN IMAGE (RESPONSIVE) */
    .main-img {
      position: relative;
      z-index: 2;
      max-width: 95%;
      max-height: 95%;
      width: auto;
      height: auto;
      object-fit: contain;
      border-radius: 12px;
      box-shadow: 0 0 50px rgba(255,0,0,0.4);
    }

    /* 📱 MOBILE FIX */
    @media (max-width: 768px) {
      .main-img {
        max-width: 100%;
        max-height: 80%;
      }
    }

    /* 💬 WhatsApp Button */
    .whatsapp-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 12px 18px;
      background: #25D366;
      color: white;
      font-size: 14px;
      border-radius: 50px;
      text-decoration: none;
      font-weight: bold;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      z-index: 3;
    }

    .whatsapp-btn:hover {
      background: #1ebd5a;
    }
  </style>
</head>

<body>

  <div class="image-container">
    <!-- ✅ SAME IMAGE USE KARO -->
    <img src="goa.jpg" class="main-img">
  </div>

  <a class="whatsapp-btn"
     href="https://wa.me/919904388056?text=Hello%20bhai%20mujhe%20info%20chahiye"
     target="_blank">
     WhatsApp
  </a>
</body>
</html>
